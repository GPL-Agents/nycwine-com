name: Fetch Wine Events

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6am UTC (2am EST / 1am EDT)
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run event fetch
        run: node scripts/event-fetch.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/events-cache.json
          git diff --staged --quiet || git commit -m "chore: update events cache"
          git push
