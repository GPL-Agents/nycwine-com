name: Fetch Wine Auctions

on:
  schedule:
    - cron: '0 7 * * 1'  # Runs weekly on Monday at 7am UTC (3am EST)
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch auctions
        run: node scripts/auction-fetch.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/auctions-cache.json
          git diff --staged --quiet || git commit -m "chore: update auctions cache"
          git push
