name: Fetch Wine Videos

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly, Monday 8am UTC (4am EST) — staggered after auctions/events
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/youtube-fetch.js

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/youtube-cache.json
          git diff --staged --quiet || git commit -m "chore: update youtube cache"
          git push
