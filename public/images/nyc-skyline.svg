<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" preserveAspectRatio="none">
  <g fill="#dcdcdc" opacity="0.5">

    <!-- Far left low buildings -->
    <rect x="0" y="60" width="12" height="20"/>
    <rect x="16" y="55" width="10" height="25"/>
    <rect x="30" y="58" width="14" height="22"/>
    <rect x="48" y="52" width="10" height="28"/>
    <rect x="62" y="56" width="16" height="24"/>
    <rect x="82" y="50" width="12" height="30"/>
    <rect x="98" y="54" width="14" height="26"/>
    <rect x="116" y="48" width="10" height="32"/>
    <rect x="130" y="52" width="16" height="28"/>
    <rect x="150" y="46" width="12" height="34"/>
    <rect x="166" y="50" width="14" height="30"/>

    <!-- Left mid buildings growing taller -->
    <rect x="186" y="40" width="14" height="40"/>
    <rect x="204" y="44" width="18" height="36"/>
    <rect x="226" y="36" width="12" height="44"/>
    <rect x="242" y="42" width="16" height="38"/>
    <rect x="262" y="34" width="14" height="46"/>
    <rect x="280" y="38" width="10" height="42"/>

    <!-- Pre-bridge left buildings -->
    <rect x="296" y="30" width="16" height="50"/>
    <rect x="316" y="36" width="12" height="44"/>
    <rect x="332" y="28" width="18" height="52"/>
    <rect x="354" y="34" width="14" height="46"/>
    <rect x="374" y="30" width="12" height="50"/>
    <rect x="390" y="36" width="16" height="44"/>
  </g>

  <!-- ═══ BROOKLYN BRIDGE ═══ -->
  <g fill="none" stroke="#dcdcdc" stroke-opacity="0.5">

    <!-- Left tower (Gothic arch shape) -->
    <rect x="418" y="10" width="6" height="70" fill="#dcdcdc" fill-opacity="0.5" stroke="none"/>
    <rect x="430" y="10" width="6" height="70" fill="#dcdcdc" fill-opacity="0.5" stroke="none"/>
    <!-- Gothic arch opening in left tower -->
    <path d="M424,50 L424,38 Q427,32 430,38 L430,50" stroke-width="1.5"/>
    <!-- Tower cap -->
    <rect x="416" y="8" width="22" height="4" fill="#dcdcdc" fill-opacity="0.5" stroke="none"/>

    <!-- Right tower (Gothic arch shape) -->
    <rect x="764" y="10" width="6" height="70" fill="#dcdcdc" fill-opacity="0.5" stroke="none"/>
    <rect x="776" y="10" width="6" height="70" fill="#dcdcdc" fill-opacity="0.5" stroke="none"/>
    <!-- Gothic arch opening in right tower -->
    <path d="M770,50 L770,38 Q773,32 776,38 L776,50" stroke-width="1.5"/>
    <!-- Tower cap -->
    <rect x="762" y="8" width="22" height="4" fill="#dcdcdc" fill-opacity="0.5" stroke="none"/>

    <!-- Main suspension cables (catenary curves between towers) -->
    <path d="M427,12 Q500,55 600,58 Q700,55 773,12" stroke-width="1.8"/>

    <!-- Secondary lower cables -->
    <path d="M427,16 Q510,52 600,54 Q690,52 773,16" stroke-width="1"/>

    <!-- Vertical suspender cables from main cable down to deck -->
    <line x1="450" y1="26" x2="450" y2="72" stroke-width="0.6"/>
    <line x1="470" y1="34" x2="470" y2="72" stroke-width="0.6"/>
    <line x1="490" y1="40" x2="490" y2="72" stroke-width="0.6"/>
    <line x1="510" y1="44" x2="510" y2="72" stroke-width="0.6"/>
    <line x1="530" y1="48" x2="530" y2="72" stroke-width="0.6"/>
    <line x1="550" y1="52" x2="550" y2="72" stroke-width="0.6"/>
    <line x1="570" y1="55" x2="570" y2="72" stroke-width="0.6"/>
    <line x1="590" y1="57" x2="590" y2="72" stroke-width="0.6"/>
    <line x1="610" y1="57" x2="610" y2="72" stroke-width="0.6"/>
    <line x1="630" y1="55" x2="630" y2="72" stroke-width="0.6"/>
    <line x1="650" y1="52" x2="650" y2="72" stroke-width="0.6"/>
    <line x1="670" y1="48" x2="670" y2="72" stroke-width="0.6"/>
    <line x1="690" y1="44" x2="690" y2="72" stroke-width="0.6"/>
    <line x1="710" y1="40" x2="710" y2="72" stroke-width="0.6"/>
    <line x1="730" y1="34" x2="730" y2="72" stroke-width="0.6"/>
    <line x1="750" y1="26" x2="750" y2="72" stroke-width="0.6"/>

    <!-- Diagonal stay cables from left tower -->
    <line x1="427" y1="14" x2="460" y2="72" stroke-width="0.6"/>
    <line x1="427" y1="14" x2="480" y2="72" stroke-width="0.6"/>
    <line x1="427" y1="14" x2="510" y2="72" stroke-width="0.6"/>
    <line x1="427" y1="14" x2="545" y2="72" stroke-width="0.6"/>

    <!-- Diagonal stay cables from right tower -->
    <line x1="773" y1="14" x2="740" y2="72" stroke-width="0.6"/>
    <line x1="773" y1="14" x2="720" y2="72" stroke-width="0.6"/>
    <line x1="773" y1="14" x2="690" y2="72" stroke-width="0.6"/>
    <line x1="773" y1="14" x2="655" y2="72" stroke-width="0.6"/>

    <!-- Road deck -->
    <line x1="418" y1="72" x2="782" y2="72" stroke-width="2"/>

  </g>

  <!-- Right side buildings (after bridge) -->
  <g fill="#dcdcdc" opacity="0.5">
    <rect x="798" y="36" width="16" height="44"/>
    <rect x="818" y="30" width="14" height="50"/>
    <rect x="836" y="34" width="18" height="46"/>
    <rect x="858" y="28" width="12" height="52"/>
    <rect x="874" y="32" width="16" height="48"/>
    <rect x="894" y="36" width="14" height="44"/>

    <!-- Right side tapering -->
    <rect x="914" y="40" width="12" height="40"/>
    <rect x="930" y="44" width="16" height="36"/>
    <rect x="950" y="38" width="10" height="42"/>
    <rect x="964" y="46" width="14" height="34"/>
    <rect x="982" y="42" width="12" height="38"/>
    <rect x="998" y="48" width="16" height="32"/>
    <rect x="1018" y="44" width="10" height="36"/>
    <rect x="1032" y="50" width="14" height="30"/>

    <!-- Far right low -->
    <rect x="1050" y="54" width="16" height="26"/>
    <rect x="1070" y="50" width="12" height="30"/>
    <rect x="1086" y="56" width="14" height="24"/>
    <rect x="1104" y="52" width="10" height="28"/>
    <rect x="1118" y="58" width="16" height="22"/>
    <rect x="1138" y="54" width="12" height="26"/>
    <rect x="1154" y="58" width="14" height="22"/>
    <rect x="1172" y="56" width="10" height="24"/>
    <rect x="1186" y="60" width="14" height="20"/>
  </g>
</svg>
