<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" preserveAspectRatio="none">

  <!-- ═══ LEFT BUILDINGS (x=0 to ~220) ═══ -->
  <g fill="#d0d0d0" opacity="0.5">
    <rect x="0" y="62" width="12" height="18"/>
    <rect x="14" y="57" width="10" height="23"/>
    <rect x="28" y="60" width="14" height="20"/>
    <rect x="46" y="54" width="10" height="26"/>
    <rect x="60" y="58" width="16" height="22"/>
    <rect x="80" y="52" width="12" height="28"/>
    <rect x="96" y="55" width="14" height="25"/>
    <rect x="114" y="50" width="10" height="30"/>
    <rect x="128" y="53" width="16" height="27"/>
    <rect x="148" y="48" width="12" height="32"/>
    <rect x="164" y="51" width="14" height="29"/>
    <rect x="182" y="46" width="12" height="34"/>
    <rect x="198" y="49" width="14" height="31"/>
    <rect x="216" y="44" width="12" height="36"/>
  </g>

  <!-- ═══ SUSPENSION BRIDGE (behind logo ~x=238 to ~x=392) ═══ -->
  <g fill="#d0d0d0" fill-opacity="0.5" stroke="#d0d0d0" stroke-opacity="0.5">
    <!-- Left tower — tapered trapezoid with crossbeams -->
    <polygon points="238,80 243,4 251,4 256,80" stroke="none"/>
    <rect x="236" y="38" width="22" height="2.5" stroke="none"/>
    <rect x="236" y="54" width="22" height="2.5" stroke="none"/>

    <!-- Right tower — tapered trapezoid with crossbeams -->
    <polygon points="374,80 379,4 387,4 392,80" stroke="none"/>
    <rect x="372" y="38" width="22" height="2.5" stroke="none"/>
    <rect x="372" y="54" width="22" height="2.5" stroke="none"/>

    <!-- Main cable (catenary curve) -->
    <path d="M247,6 C275,50 300,62 315,64 C330,62 355,50 383,6" fill="none" stroke-width="1.8"/>

    <!-- Vertical suspender cables -->
    <line x1="260" y1="22" x2="260" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="272" y1="33" x2="272" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="284" y1="42" x2="284" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="296" y1="50" x2="296" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="306" y1="56" x2="306" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="315" y1="60" x2="315" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="324" y1="56" x2="324" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="334" y1="50" x2="334" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="346" y1="42" x2="346" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="358" y1="33" x2="358" y2="66" fill="none" stroke-width="0.6"/>
    <line x1="370" y1="22" x2="370" y2="66" fill="none" stroke-width="0.6"/>

    <!-- Road deck -->
    <line x1="233" y1="66" x2="397" y2="66" fill="none" stroke-width="2"/>
  </g>

  <!-- ═══ RIGHT SIDE: ICONIC NYC SKYLINE (x=410+) ═══ -->
  <g fill="#d0d0d0" opacity="0.5">

    <!-- Transition buildings after bridge -->
    <rect x="410" y="52" width="10" height="28"/>
    <rect x="424" y="46" width="12" height="34"/>
    <rect x="440" y="50" width="10" height="30"/>

    <!-- ── Statue of Liberty silhouette ── -->
    <!-- Body/pedestal -->
    <polygon points="458,80 460,56 464,50 462,46 466,44 464,40 468,38 466,34 470,80"/>
    <!-- Torch arm raised -->
    <line x1="464" y1="40" x2="458" y2="28" stroke="#d0d0d0" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Torch flame -->
    <ellipse cx="457" cy="25" rx="2.5" ry="4"/>
    <!-- Crown spikes -->
    <line x1="463" y1="34" x2="460" y2="28" stroke="#d0d0d0" stroke-opacity="0.5" stroke-width="0.8"/>
    <line x1="465" y1="33" x2="465" y2="26" stroke="#d0d0d0" stroke-opacity="0.5" stroke-width="0.8"/>
    <line x1="467" y1="34" x2="470" y2="28" stroke="#d0d0d0" stroke-opacity="0.5" stroke-width="0.8"/>

    <!-- Low buildings between Liberty and midtown -->
    <rect x="480" y="54" width="14" height="26"/>
    <rect x="498" y="48" width="10" height="32"/>
    <rect x="512" y="52" width="16" height="28"/>
    <rect x="532" y="44" width="12" height="36"/>
    <rect x="548" y="48" width="14" height="32"/>

    <!-- Growing taller toward midtown -->
    <rect x="566" y="38" width="14" height="42"/>
    <rect x="584" y="34" width="16" height="46"/>
    <rect x="604" y="30" width="12" height="50"/>
    <rect x="620" y="36" width="14" height="44"/>
    <rect x="638" y="28" width="16" height="52"/>

    <!-- ── CHRYSLER BUILDING ── -->
    <!-- Main shaft -->
    <rect x="660" y="18" width="14" height="62"/>
    <!-- Art deco terraced crown -->
    <polygon points="660,18 662,14 664,16 666,11 668,14 670,8 672,14 674,11 676,16 678,14 680,18"/>
    <!-- Spire -->
    <rect x="669" y="0" width="2" height="8"/>

    <!-- Buildings between Chrysler and Empire State -->
    <rect x="686" y="26" width="14" height="54"/>
    <rect x="704" y="22" width="12" height="58"/>
    <rect x="720" y="30" width="16" height="50"/>

    <!-- ── EMPIRE STATE BUILDING ── -->
    <!-- Wide base -->
    <rect x="742" y="26" width="30" height="54"/>
    <!-- Setback 1 -->
    <rect x="746" y="18" width="22" height="8"/>
    <!-- Setback 2 -->
    <rect x="750" y="12" width="14" height="6"/>
    <!-- Upper tower -->
    <rect x="753" y="6" width="8" height="6"/>
    <!-- Antenna mast (tall, iconic) -->
    <rect x="756" y="0" width="2" height="6"/>

    <!-- Buildings between Empire State and One WTC -->
    <rect x="778" y="28" width="14" height="52"/>
    <rect x="796" y="24" width="16" height="56"/>
    <rect x="816" y="32" width="12" height="48"/>
    <rect x="832" y="26" width="14" height="54"/>

    <!-- ── ONE WORLD TRADE CENTER ── -->
    <!-- Tapered form -->
    <polygon points="854,80 856,10 864,2 872,10 874,80"/>
    <!-- Antenna -->
    <rect x="863" y="0" width="2" height="2"/>

    <!-- WTC complex neighbors -->
    <rect x="880" y="24" width="14" height="56"/>
    <rect x="898" y="20" width="12" height="60"/>
    <rect x="914" y="28" width="16" height="52"/>

    <!-- Financial district -->
    <rect x="934" y="32" width="14" height="48"/>
    <rect x="952" y="28" width="16" height="52"/>
    <rect x="972" y="36" width="12" height="44"/>
    <rect x="988" y="32" width="14" height="48"/>

    <!-- Tapering right -->
    <rect x="1006" y="40" width="12" height="40"/>
    <rect x="1022" y="44" width="14" height="36"/>
    <rect x="1040" y="40" width="10" height="40"/>
    <rect x="1054" y="48" width="14" height="32"/>
    <rect x="1072" y="44" width="12" height="36"/>
    <rect x="1088" y="50" width="14" height="30"/>

    <!-- Far right low -->
    <rect x="1106" y="54" width="12" height="26"/>
    <rect x="1122" y="50" width="14" height="30"/>
    <rect x="1140" y="56" width="10" height="24"/>
    <rect x="1154" y="52" width="14" height="28"/>
    <rect x="1172" y="58" width="12" height="22"/>
    <rect x="1188" y="62" width="12" height="18"/>
  </g>
</svg>
