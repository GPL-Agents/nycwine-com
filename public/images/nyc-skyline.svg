<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" preserveAspectRatio="none">

  <!-- ═══ BROOKLYN BRIDGE (behind logo area, x=0 to ~240) ═══ -->
  <g fill="none" stroke="#dcdcdc" stroke-opacity="0.55">

    <!-- Left tower -->
    <rect x="30" y="10" width="5" height="70" fill="#dcdcdc" fill-opacity="0.55" stroke="none"/>
    <rect x="40" y="10" width="5" height="70" fill="#dcdcdc" fill-opacity="0.55" stroke="none"/>
    <path d="M35,48 L35,36 Q37.5,30 40,36 L40,48" stroke-width="1.2"/>
    <rect x="28" y="8" width="19" height="3" fill="#dcdcdc" fill-opacity="0.55" stroke="none"/>

    <!-- Right tower -->
    <rect x="195" y="10" width="5" height="70" fill="#dcdcdc" fill-opacity="0.55" stroke="none"/>
    <rect x="205" y="10" width="5" height="70" fill="#dcdcdc" fill-opacity="0.55" stroke="none"/>
    <path d="M200,48 L200,36 Q202.5,30 205,36 L205,48" stroke-width="1.2"/>
    <rect x="193" y="8" width="19" height="3" fill="#dcdcdc" fill-opacity="0.55" stroke="none"/>

    <!-- Main suspension cables -->
    <path d="M37,12 Q75,50 120,54 Q165,50 202,12" stroke-width="1.5"/>
    <path d="M37,16 Q80,46 120,49 Q160,46 202,16" stroke-width="0.8"/>

    <!-- Vertical suspender cables -->
    <line x1="55" y1="26" x2="55" y2="70" stroke-width="0.5"/>
    <line x1="70" y1="34" x2="70" y2="70" stroke-width="0.5"/>
    <line x1="85" y1="40" x2="85" y2="70" stroke-width="0.5"/>
    <line x1="100" y1="46" x2="100" y2="70" stroke-width="0.5"/>
    <line x1="115" y1="50" x2="115" y2="70" stroke-width="0.5"/>
    <line x1="130" y1="50" x2="130" y2="70" stroke-width="0.5"/>
    <line x1="145" y1="46" x2="145" y2="70" stroke-width="0.5"/>
    <line x1="160" y1="40" x2="160" y2="70" stroke-width="0.5"/>
    <line x1="175" y1="34" x2="175" y2="70" stroke-width="0.5"/>
    <line x1="190" y1="26" x2="190" y2="70" stroke-width="0.5"/>

    <!-- Diagonal stay cables from left tower -->
    <line x1="37" y1="14" x2="65" y2="70" stroke-width="0.5"/>
    <line x1="37" y1="14" x2="85" y2="70" stroke-width="0.5"/>
    <line x1="37" y1="14" x2="108" y2="70" stroke-width="0.5"/>

    <!-- Diagonal stay cables from right tower -->
    <line x1="202" y1="14" x2="175" y2="70" stroke-width="0.5"/>
    <line x1="202" y1="14" x2="155" y2="70" stroke-width="0.5"/>
    <line x1="202" y1="14" x2="132" y2="70" stroke-width="0.5"/>

    <!-- Road deck -->
    <line x1="28" y1="70" x2="212" y2="70" stroke-width="1.5"/>
  </g>

  <!-- ═══ BUILDINGS (from x=230 rightward — behind search box & ad) ═══ -->
  <g fill="#dcdcdc" opacity="0.5">

    <!-- Transition from bridge to buildings -->
    <rect x="230" y="44" width="12" height="36"/>
    <rect x="246" y="38" width="14" height="42"/>
    <rect x="264" y="42" width="10" height="38"/>
    <rect x="278" y="36" width="16" height="44"/>

    <!-- Growing taller toward midtown -->
    <rect x="298" y="30" width="14" height="50"/>
    <rect x="316" y="34" width="18" height="46"/>
    <rect x="338" y="28" width="12" height="52"/>
    <rect x="354" y="32" width="16" height="48"/>
    <rect x="374" y="26" width="14" height="54"/>

    <!-- Empire State Building -->
    <rect x="396" y="28" width="28" height="52"/>
    <rect x="400" y="20" width="20" height="8"/>
    <rect x="404" y="14" width="12" height="6"/>
    <rect x="407" y="6" width="6" height="8"/>
    <rect x="409" y="0" width="2" height="6"/>

    <!-- Mid buildings -->
    <rect x="430" y="30" width="14" height="50"/>
    <rect x="448" y="24" width="18" height="56"/>
    <rect x="470" y="32" width="12" height="48"/>
    <rect x="486" y="26" width="16" height="54"/>

    <!-- Chrysler Building -->
    <rect x="508" y="16" width="16" height="64"/>
    <polygon points="508,16 516,4 524,16"/>
    <rect x="515" y="0" width="2" height="4"/>

    <!-- East midtown -->
    <rect x="530" y="28" width="16" height="52"/>
    <rect x="550" y="22" width="14" height="58"/>
    <rect x="568" y="30" width="18" height="50"/>
    <rect x="590" y="24" width="12" height="56"/>

    <!-- Transitional -->
    <rect x="608" y="34" width="16" height="46"/>
    <rect x="628" y="28" width="14" height="52"/>
    <rect x="646" y="36" width="12" height="44"/>
    <rect x="662" y="30" width="18" height="50"/>

    <!-- One World Trade Center -->
    <polygon points="690,80 690,8 700,2 710,8 710,80"/>
    <rect x="699" y="0" width="2" height="2"/>

    <!-- WTC neighbors -->
    <rect x="716" y="22" width="16" height="58"/>
    <rect x="736" y="18" width="14" height="62"/>
    <rect x="754" y="26" width="16" height="54"/>

    <!-- Financial district -->
    <rect x="776" y="30" width="14" height="50"/>
    <rect x="794" y="24" width="18" height="56"/>
    <rect x="816" y="32" width="12" height="48"/>
    <rect x="832" y="28" width="16" height="52"/>
    <rect x="852" y="36" width="14" height="44"/>

    <!-- Tapering right -->
    <rect x="872" y="40" width="12" height="40"/>
    <rect x="888" y="44" width="16" height="36"/>
    <rect x="908" y="38" width="10" height="42"/>
    <rect x="922" y="46" width="14" height="34"/>
    <rect x="940" y="42" width="12" height="38"/>
    <rect x="956" y="48" width="16" height="32"/>
    <rect x="976" y="44" width="10" height="36"/>
    <rect x="990" y="50" width="14" height="30"/>

    <!-- Far right low -->
    <rect x="1008" y="54" width="16" height="26"/>
    <rect x="1028" y="50" width="12" height="30"/>
    <rect x="1044" y="56" width="14" height="24"/>
    <rect x="1062" y="52" width="10" height="28"/>
    <rect x="1076" y="58" width="16" height="22"/>
    <rect x="1096" y="54" width="12" height="26"/>
    <rect x="1112" y="58" width="14" height="22"/>
    <rect x="1130" y="56" width="10" height="24"/>
    <rect x="1144" y="60" width="16" height="20"/>
    <rect x="1164" y="58" width="12" height="22"/>
    <rect x="1180" y="62" width="18" height="18"/>
  </g>
</svg>
