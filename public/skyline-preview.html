<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #f5f5f5; font-family: sans-serif; }
  .label { padding: 12px 20px 4px; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .header-sim {
    background: white url('nyc-skyline-photo.png') center bottom / 100% auto no-repeat;
    border-top: 3px solid #c0392b;
    border-bottom: 3px solid #c0392b;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    box-sizing: border-box;
  }
  .logo { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 4px 12px; font-weight: bold; font-size: 14px; color: #333; }
  .search { flex: 1; max-width: 300px; background: white; border: 1px solid #ddd; border-radius: 20px; padding: 6px 16px; font-size: 12px; color: #999; }
  .ad { background: white; border: 1px solid #ddd; border-radius: 4px; width: 200px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa; }
  .mobile { width: 375px; }
</style>
</head>
<body>
  <div class="label">Desktop</div>
  <div class="header-sim">
    <div class="logo">NYCWine.com</div>
    <div class="search">Search wine, stores, events…</div>
    <div class="ad">Yorkshire Wines Ad</div>
  </div>
  <div class="label" style="margin-top:24px">Mobile (375px)</div>
  <div class="header-sim mobile">
    <div class="logo">NYCWine.com</div>
    <div class="search">Search…</div>
  </div>
</body>
</html>
